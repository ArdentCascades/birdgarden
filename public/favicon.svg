<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#2d6a4f"/>
  <!-- Bird silhouette -->
  <g fill="#ffffff">
    <!-- Body -->
    <ellipse cx="14" cy="18" rx="6" ry="4.5" transform="rotate(-15 14 18)"/>
    <!-- Head -->
    <circle cx="20" cy="12" r="3.5"/>
    <!-- Beak -->
    <path d="M23 11.5 L27 12 L23 13" fill="#f4c97a"/>
    <!-- Eye -->
    <circle cx="21" cy="11.5" r="1" fill="#2d6a4f"/>
    <!-- Wing accent -->
    <path d="M11 17 Q8 14 10 11 Q12 14 14 16" opacity="0.6"/>
    <!-- Tail -->
    <path d="M8.5 19.5 Q5 20 4 23 Q7 20.5 9.5 21" opacity="0.85"/>
  </g>
  <!-- Leaf / branch -->
  <path d="M10 25 Q16 22 22 24" stroke="#f4c97a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
