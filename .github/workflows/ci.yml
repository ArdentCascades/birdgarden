name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate seed data
        run: bun run validate-data

      - name: Run unit & integration tests
        run: bun run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test   # only run E2E if unit tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Seed database
        run: bun run seed

      - name: Build site
        run: bun run build

      - name: Run E2E tests
        run: bunx playwright test
        env:
          CI: true
